name: Container Build And GitOps

on:
  push:
    branches:
      - main
    paths-ignore:
      - k8s/overlays/staging/deployment-image-patch.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  QUAY_REGISTRY: ${{ vars.QUAY_REGISTRY }}
  QUAY_IMAGE_REPOSITORY: ${{ vars.QUAY_IMAGE_REPOSITORY }}
  IMAGE_REPO: ${{ vars.QUAY_REGISTRY }}/${{ vars.QUAY_IMAGE_REPOSITORY }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite3
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Prepare app key and sqlite
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php artisan package:discover --ansi
          php artisan key:generate

      - name: Run tests
        run: php artisan test --compact

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Quay
        uses: docker/login-action@v3
        with:
          registry: ${{ env.QUAY_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-staging-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Update staging image tag
        run: |
          sed -E -i "s|image: .*openshift-laravel-pgsql:.*|image: ${IMAGE_REPO}:${{ needs.build-and-push.outputs.image_tag }}|g" k8s/overlays/staging/deployment-image-patch.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add k8s/overlays/staging/deployment-image-patch.yaml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "ci: promote staging image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
